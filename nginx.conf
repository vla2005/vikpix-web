server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /register {
    try_files /index.html =404;
  }

  location = /login {
    try_files /index.html =404;
  }

  location = /dashboard {
    try_files /index.html =404;
  }

  location = /widgets {
    try_files /index.html =404;
  }

  location = /settings {
    try_files /index.html =404;
  }

  location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    return 404;
  }
}
